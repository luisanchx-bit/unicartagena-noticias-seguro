<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Universidad de Cartagena</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        /* Efecto Liquid Glass - burbujas de fondo */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255,255,255,0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255,255,255,0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(255,255,255,0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        .register-container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            width: 90%;
            max-width: 450px;
            animation: fadeIn 0.5s ease-in;
            border: 1px solid rgba(255, 255, 255, 0.3);
            position: relative;
            z-index: 1;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        h2 {
            text-align: center;
            color: white;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        
        input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            font-size: 16px;
            color: white;
            transition: all 0.3s;
        }
        
        input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        
        input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.6);
        }
        
        button {
            width: 100%;
            background: rgba(39, 174, 96, 0.9);
            backdrop-filter: blur(4px);
            color: white;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        button:hover {
            background: rgba(39, 174, 96, 1);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .error {
            background: rgba(231, 76, 60, 0.9);
            backdrop-filter: blur(4px);
            color: white;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .success {
            background: rgba(39, 174, 96, 0.9);
            backdrop-filter: blur(4px);
            color: white;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .login-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .login-link a {
            color: #f39c12;
            text-decoration: none;
            font-weight: bold;
        }
        
        .login-link a:hover {
            text-decoration: underline;
            color: #e67e22;
        }
        
        .info-text {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h2>📝 Crear Cuenta</h2>
        <div class="subtitle">Universidad de Cartagena</div>
        
        <div id="mensajeError" class="error"></div>
        <div id="mensajeSuccess" class="success"></div>
        
        <form id="registerForm">
            <div class="form-group">
                <label>👤 Nombre completo:</label>
                <input type="text" id="nombre" required autocomplete="off" placeholder="Tu nombre completo">
            </div>
            
            <div class="form-group">
                <label>👥 Usuario:</label>
                <input type="text" id="username" required autocomplete="off" placeholder="Elige un usuario">
                <div class="info-text">Elige un nombre de usuario único</div>
            </div>
            
            <div class="form-group">
                <label>🔒 Contraseña:</label>
                <input type="password" id="password" required placeholder="Mínimo 6 caracteres">
                <div class="info-text">Mínimo 6 caracteres</div>
            </div>
            
            <button type="submit">Registrarse</button>
        </form>
        
        <div class="login-link">
            ¿Ya tienes cuenta? <a href="/login.html">🔐 Inicia sesión aquí</a>
        </div>
    </div>
    
    <script>
        const form = document.getElementById('registerForm');
        const errorDiv = document.getElementById('mensajeError');
        const successDiv = document.getElementById('mensajeSuccess');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nombre = document.getElementById('nombre').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            if (password.length < 6) {
                errorDiv.innerHTML = '❌ La contraseña debe tener al menos 6 caracteres';
                errorDiv.style.display = 'block';
                return;
            }
            
            const btn = form.querySelector('button');
            const btnText = btn.textContent;
            btn.textContent = '⏳ Registrando...';
            btn.disabled = true;
            
            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre, username, password })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    successDiv.innerHTML = data.message + ' ✅ Redirigiendo al login...';
                    successDiv.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 2000);
                } else {
                    errorDiv.innerHTML = data.error || '❌ Error al registrar usuario';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.innerHTML = '❌ Error de conexión. Intenta de nuevo.';
                errorDiv.style.display = 'block';
            } finally {
                btn.textContent = btnText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
