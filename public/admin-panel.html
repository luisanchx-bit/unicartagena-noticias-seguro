<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Universidad de Cartagena</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e2f;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            margin-bottom: 20px;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .card h2 {
            color: #1e3c72;
            margin-bottom: 15px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #1e3c72;
            color: white;
        }
        tr:hover {
            background: #f5f5f5;
        }
        button {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #c0392b;
        }
        .btn-success {
            background: #27ae60;
        }
        .btn-success:hover {
            background: #229954;
        }
        .btn-info {
            background: #3498db;
        }
        .btn-info:hover {
            background: #2980b9;
        }
        .logout-btn {
            background: #e74c3c;
            padding: 10px 20px;
            margin-bottom: 20px;
            display: inline-block;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }
        .stat-card h3 {
            font-size: 2em;
        }
        .mensaje {
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            display: none;
        }
        .mensaje-exito {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .mensaje-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>🛡️ Panel de Administración</h1>
            <a href="/logout" class="logout-btn" style="background: #e74c3c; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px;">🚪 Cerrar sesión</a>
        </div>
        
        <div id="mensajeGlobal" class="mensaje"></div>
        
        <div class="stats" id="stats">
            <!-- Estadísticas se cargan aquí -->
        </div>
        
        <div class="card">
            <h2>👥 Usuarios Registrados</h2>
            <table id="tablaUsuarios">
                <thead>
                    <tr><th>ID</th><th>Usuario</th><th>Nombre</th><th>Rol</th><th>Acciones</th></tr>
                </thead>
                <tbody id="usuariosBody"></tbody>
            </table>
        </div>
        
        <div class="card">
            <h2>🔒 IPs Bloqueadas</h2>
            <table id="tablaBloqueos">
                <thead>
                    <tr><th>IP</th><th>Intentos fallidos</th><th>Nivel bloqueo</th><th>Desbloqueo</th><th>Acciones</th></tr>
                </thead>
                <tbody id="bloqueosBody"></tbody>
            </table>
        </div>
        
        <div class="card">
            <h2>📊 Logs de Intentos (últimos 20)</h2>
            <table id="tablaLogs">
                <thead>
                    <tr><th>Fecha</th><th>IP</th><th>Usuario</th><th>Resultado</th></tr>
                </thead>
                <tbody id="logsBody"></tbody>
            </table>
        </div>
    </div>
    
    <script>
        async function cargarDatos() {
            try {
                const response = await fetch('/api/admin/datos');
                const data = await response.json();
                
                if (response.ok) {
                    // Actualizar estadísticas
                    document.getElementById('stats').innerHTML = `
                        <div class="stat-card"><h3>${data.stats.totalUsuarios}</h3><p>Usuarios</p></div>
                        <div class="stat-card"><h3>${data.stats.totalBloqueos}</h3><p>IPs bloqueadas</p></div>
                        <div class="stat-card"><h3>${data.stats.totalIntentosFallidos}</h3><p>Intentos fallidos</p></div>
                    `;
                    
                    // Cargar usuarios
                    document.getElementById('usuariosBody').innerHTML = data.usuarios.map(u => `
                        <tr>
                            <td>${u.id}</td>
                            <td>${u.username}</td>
                            <td>${u.nombre || '-'}</td>
                            <td>${u.rol}</td>
                            <td>
                                ${u.rol !== 'admin' ? `<button onclick="eliminarUsuario(${u.id})">🗑️ Eliminar</button>` : 'Admin'}
                            </td>
                        </tr>
                    `).join('');
                    
                    // Cargar bloqueos
                    document.getElementById('bloqueosBody').innerHTML = data.bloqueos.map(b => `
                        <tr>
                            <td>${b.ip}</td>
                            <td>${b.intentos_fallidos}</td>
                            <td>${b.nivel_bloqueo}</td>
                            <td>${b.desbloqueo_en ? new Date(b.desbloqueo_en).toLocaleString() : 'Sin bloqueo'}</td>
                            <td><button onclick="desbloquearIP('${b.ip}')">🔓 Desbloquear</button></td>
                        </tr>
                    `).join('');
                    
                    // Cargar logs
                    document.getElementById('logsBody').innerHTML = data.logs.map(l => `
                        <tr>
                            <td>${new Date(l.timestamp).toLocaleString()}</td>
                            <td>${l.ip}</td>
                            <td>${l.username || '-'}</td>
                            <td style="color: ${l.exito ? 'green' : 'red'}">${l.exito ? '✅ Exitoso' : '❌ Fallido'}</td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                mostrarMensaje('Error al cargar datos', 'error');
            }
        }
        
        async function eliminarUsuario(id) {
            if (!confirm('¿Eliminar este usuario?')) return;
            try {
                const response = await fetch('/api/admin/usuario/' + id, { method: 'DELETE' });
                const data = await response.json();
                if (response.ok) {
                    mostrarMensaje('Usuario eliminado', 'exito');
                    cargarDatos();
                } else {
                    mostrarMensaje(data.error, 'error');
                }
            } catch (error) {
                mostrarMensaje('Error al eliminar', 'error');
            }
        }
        
        async function desbloquearIP(ip) {
            try {
                const response = await fetch('/api/admin/desbloquear', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ip })
                });
                const data = await response.json();
                if (response.ok) {
                    mostrarMensaje('IP desbloqueada', 'exito');
                    cargarDatos();
                } else {
                    mostrarMensaje(data.error, 'error');
                }
            } catch (error) {
                mostrarMensaje('Error al desbloquear', 'error');
            }
        }
        
        function mostrarMensaje(msg, tipo) {
            const div = document.getElementById('mensajeGlobal');
            div.textContent = msg;
            div.className = `mensaje mensaje-${tipo === 'exito' ? 'exito' : 'error'}`;
            div.style.display = 'block';
            setTimeout(() => div.style.display = 'none', 3000);
        }
        
        cargarDatos();
        setInterval(cargarDatos, 30000); // Actualizar cada 30 segundos
    </script>
</body>
</html>
